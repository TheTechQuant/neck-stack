name: ci

on:
  pull_request:
  push:
    branches:
      - main

env:
  REGISTRY_IMAGE: ${{ vars.REGISTRY_IMAGE || format('ghcr.io/{0}', github.repository) }}
  BACKEND_IMAGE: ${{ vars.REGISTRY_IMAGE || format('ghcr.io/{0}', github.repository) }}/backend:${{ github.sha }}
  FRONTEND_IMAGE: ${{ vars.REGISTRY_IMAGE || format('ghcr.io/{0}', github.repository) }}/frontend:${{ github.sha }}
  MIGRATIONS_IMAGE: ${{ vars.REGISTRY_IMAGE || format('ghcr.io/{0}', github.repository) }}/migrations:${{ github.sha }}
  PROD_PLATFORM: ${{ vars.PROD_PLATFORM || '__PROD_PLATFORM__' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      ENCORE_AUTH_KEY: ${{ secrets.ENCORE_AUTH_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Encore
        run: |
          curl -fsSL https://encore.dev/install.sh -o /tmp/install-encore.sh
          bash /tmp/install-encore.sh
          echo "$HOME/.encore/bin" >> "$GITHUB_PATH"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm dlx zx scripts/install.mjs --frozen-lockfile
      - name: Login to Encore
        if: env.ENCORE_AUTH_KEY != ''
        run: encore auth login --auth-key="$ENCORE_AUTH_KEY"
      - name: Check
        run: pnpm check

  build-images:
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    env:
      ENCORE_AUTH_KEY: ${{ secrets.ENCORE_AUTH_KEY }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Encore
        run: |
          curl -fsSL https://encore.dev/install.sh -o /tmp/install-encore.sh
          bash /tmp/install-encore.sh
          echo "$HOME/.encore/bin" >> "$GITHUB_PATH"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm dlx zx scripts/install.mjs --frozen-lockfile
      - name: Login to Encore
        if: env.ENCORE_AUTH_KEY != ''
        run: encore auth login --auth-key="$ENCORE_AUTH_KEY"
      - name: Login to registry
        env:
          REGISTRY_HOST: ${{ vars.REGISTRY_HOST || 'ghcr.io' }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD || github.token }}
        run: echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USERNAME" --password-stdin
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64
      - name: Resolve production platform
        id: platform
        run: |
          case "${PROD_PLATFORM:-linux/amd64}" in
            linux/amd64|amd64|x64|x86_64)
              echo "platform=linux/amd64" >> "$GITHUB_OUTPUT"
              echo "os=linux" >> "$GITHUB_OUTPUT"
              echo "arch=amd64" >> "$GITHUB_OUTPUT"
              ;;
            linux/arm64|arm64|arm|aarch64)
              echo "platform=linux/arm64" >> "$GITHUB_OUTPUT"
              echo "os=linux" >> "$GITHUB_OUTPUT"
              echo "arch=arm64" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Invalid PROD_PLATFORM=${PROD_PLATFORM}. Use linux/amd64 or linux/arm64."
              exit 1
              ;;
          esac
      - name: Generate Encore infra
        run: pnpm infra:encore
      - name: Detect SQL resources
        id: sql
        run: |
          has_sql="$(node -e 'const fs=require("fs"); const infra=JSON.parse(fs.readFileSync("deploy/encore/infra.prod.json","utf8")); console.log(Array.isArray(infra.sql_servers)&&infra.sql_servers.some((s)=>Object.keys(s.databases||{}).length>0)?"true":"false")')"
          echo "has_sql=${has_sql}" >> "$GITHUB_OUTPUT"
      - name: Generate API artifacts
        run: pnpm api:gen
      - name: Build backend image
        run: cd backend && encore build docker --os "${{ steps.platform.outputs.os }}" --arch "${{ steps.platform.outputs.arch }}" --config ../deploy/encore/infra.prod.json "$BACKEND_IMAGE"
      - name: Build frontend image
        run: |
          docker build \
            --platform "${{ steps.platform.outputs.platform }}" \
            -f frontend/Dockerfile \
            --build-arg NUXT_PUBLIC_API_BASE_URL="/api" \
            --build-arg NUXT_API_INTERNAL_BASE_URL="http://backend:8080" \
            --build-arg NUXT_PUBLIC_ENCORE_TOOLBAR="${NUXT_PUBLIC_ENCORE_TOOLBAR:-true}" \
            --build-arg NUXT_PUBLIC_ENCORE_TOOLBAR_ENV_NAME="${NUXT_PUBLIC_ENCORE_TOOLBAR_ENV_NAME:-production}" \
            --build-arg NUXT_PUBLIC_ENCORE_TOOLBAR_SRC="${NUXT_PUBLIC_ENCORE_TOOLBAR_SRC:-}" \
            -t "$FRONTEND_IMAGE" .
      - name: Build migrations image
        if: steps.sql.outputs.has_sql == 'true'
        run: docker build --platform "${{ steps.platform.outputs.platform }}" -f deploy/migrations/Dockerfile -t "$MIGRATIONS_IMAGE" .
      - name: Push images
        run: |
          docker push "$BACKEND_IMAGE"
          docker push "$FRONTEND_IMAGE"
          docker tag "$BACKEND_IMAGE" "$REGISTRY_IMAGE/backend:prod"
          docker tag "$FRONTEND_IMAGE" "$REGISTRY_IMAGE/frontend:prod"
          docker push "$REGISTRY_IMAGE/backend:prod"
          docker push "$REGISTRY_IMAGE/frontend:prod"
          if [ "${{ steps.sql.outputs.has_sql }}" = "true" ]; then
            docker push "$MIGRATIONS_IMAGE"
            docker tag "$MIGRATIONS_IMAGE" "$REGISTRY_IMAGE/migrations:prod"
            docker push "$REGISTRY_IMAGE/migrations:prod"
          else
            echo "No SQLDatabase resources; skipping migration image push."
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: generated-deploy
          retention-days: 7
          path: |
            deploy/encore/infra.prod.json
            deploy/encore/meta.json
            deploy/compose.yaml
            deploy/komodo/resources.toml

  migrate-prod:
    if: github.ref == 'refs/heads/main'
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/download-artifact@v4
        with:
          name: generated-deploy
      - name: Install dependencies
        run: |
          corepack enable
          pnpm dlx zx scripts/install.mjs --frozen-lockfile
      - name: Run Komodo migrations
        env:
          KOMODO_MIGRATE_WEBHOOK_URL: ${{ secrets.KOMODO_MIGRATE_WEBHOOK_URL }}
        run: pnpm deploy:komodo -- --skip-infra --migrate-only

  deploy-komodo:
    if: github.ref == 'refs/heads/main'
    needs:
      - build-images
      - migrate-prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/download-artifact@v4
        with:
          name: generated-deploy
      - name: Install dependencies
        run: |
          corepack enable
          pnpm dlx zx scripts/install.mjs --frozen-lockfile
      - name: Deploy Komodo stack
        env:
          KOMODO_DEPLOY_WEBHOOK_URL: ${{ secrets.KOMODO_DEPLOY_WEBHOOK_URL }}
        run: pnpm deploy:komodo -- --skip-infra --deploy-only
