name: ci

on:
  pull_request:
  push:
    branches:
      - main

env:
  REGISTRY_IMAGE: ${{ vars.REGISTRY_IMAGE || format('ghcr.io/{0}', github.repository) }}
  BACKEND_IMAGE: ${{ vars.REGISTRY_IMAGE || format('ghcr.io/{0}', github.repository) }}/backend:${{ github.sha }}
  FRONTEND_IMAGE: ${{ vars.REGISTRY_IMAGE || format('ghcr.io/{0}', github.repository) }}/frontend:${{ github.sha }}
  MIGRATIONS_IMAGE: ${{ vars.REGISTRY_IMAGE || format('ghcr.io/{0}', github.repository) }}/migrations:${{ github.sha }}
  PROD_PLATFORM: ${{ vars.PROD_PLATFORM || '__PROD_PLATFORM__' }}
  APP_ID: __APP_ID__

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      ENCORE_CLOUD_AUTH_KEY: ${{ secrets.ENCORE_CLOUD_AUTH_KEY }}
      ENCORE_AUTH_CONFIG: ${{ secrets.ENCORE_AUTH_CONFIG }}
      ENCORE_AUTH_TOKEN: ${{ secrets.ENCORE_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Encore
        run: |
          curl -fsSL https://encore.dev/install.sh -o /tmp/install-encore.sh
          bash /tmp/install-encore.sh
          echo "$HOME/.encore/bin" >> "$GITHUB_PATH"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm dlx zx scripts/neck.mjs install --frozen-lockfile
      - name: Configure Encore auth
        run: pnpm neck ci-auth
      - name: Check
        run: pnpm check

  build-images:
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    env:
      ENCORE_CLOUD_AUTH_KEY: ${{ secrets.ENCORE_CLOUD_AUTH_KEY }}
      ENCORE_AUTH_CONFIG: ${{ secrets.ENCORE_AUTH_CONFIG }}
      ENCORE_AUTH_TOKEN: ${{ secrets.ENCORE_AUTH_TOKEN }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Encore
        run: |
          curl -fsSL https://encore.dev/install.sh -o /tmp/install-encore.sh
          bash /tmp/install-encore.sh
          echo "$HOME/.encore/bin" >> "$GITHUB_PATH"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm dlx zx scripts/neck.mjs install --frozen-lockfile
      - name: Configure Encore auth
        run: pnpm neck ci-auth
      - name: Login to registry
        env:
          REGISTRY_HOST: ${{ vars.REGISTRY_HOST || 'ghcr.io' }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD || github.token }}
        run: echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USERNAME" --password-stdin
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64
      - name: Resolve production platform
        id: platform
        run: |
          case "${PROD_PLATFORM:-linux/amd64}" in
            linux/amd64|amd64|x64|x86_64)
              echo "platform=linux/amd64" >> "$GITHUB_OUTPUT"
              echo "os=linux" >> "$GITHUB_OUTPUT"
              echo "arch=amd64" >> "$GITHUB_OUTPUT"
              ;;
            linux/arm64|arm64|arm|aarch64)
              echo "platform=linux/arm64" >> "$GITHUB_OUTPUT"
              echo "os=linux" >> "$GITHUB_OUTPUT"
              echo "arch=arm64" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Invalid PROD_PLATFORM=${PROD_PLATFORM}. Use linux/amd64 or linux/arm64."
              exit 1
              ;;
          esac
      - name: Generate Encore infra
        run: pnpm neck infra
      - name: Detect SQL resources
        id: sql
        run: |
          has_sql="$(node -e 'const fs=require("fs"); const infra=JSON.parse(fs.readFileSync("deploy/encore/infra.prod.json","utf8")); console.log(Array.isArray(infra.sql_servers)&&infra.sql_servers.some((s)=>Object.keys(s.databases||{}).length>0)?"true":"false")')"
          echo "has_sql=${has_sql}" >> "$GITHUB_OUTPUT"
      - name: Generate API artifacts
        run: pnpm neck api
      - name: Build backend image
        run: pnpm neck docker backend
      - name: Build frontend image
        run: pnpm neck docker frontend
      - name: Build migrations image
        if: steps.sql.outputs.has_sql == 'true'
        run: pnpm neck docker migrations
      - name: Push images
        run: |
          docker push "$BACKEND_IMAGE"
          docker push "$FRONTEND_IMAGE"
          docker tag "$BACKEND_IMAGE" "$REGISTRY_IMAGE/backend:prod"
          docker tag "$FRONTEND_IMAGE" "$REGISTRY_IMAGE/frontend:prod"
          docker push "$REGISTRY_IMAGE/backend:prod"
          docker push "$REGISTRY_IMAGE/frontend:prod"
          if [ "${{ steps.sql.outputs.has_sql }}" = "true" ]; then
            docker push "$MIGRATIONS_IMAGE"
            docker tag "$MIGRATIONS_IMAGE" "$REGISTRY_IMAGE/migrations:prod"
            docker push "$REGISTRY_IMAGE/migrations:prod"
          else
            echo "No SQLDatabase resources; skipping migration image push."
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: generated-deploy
          retention-days: 7
          path: |
            deploy/encore/infra.prod.json
            deploy/encore/runtime.prod.pb
            deploy/encore/meta.json
            deploy/compose.yaml
            deploy/komodo/resources.toml
            deploy/neckdash/compose.yaml
            deploy/neckdash/signoz-otel-collector.yaml
            deploy/neckdash/clickhouse-cluster.xml
            deploy/neckdash/clickhouse-custom-function.xml
            deploy/neckdash/resources.toml
