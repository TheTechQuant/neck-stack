# Generated by scripts/generate-encore-config.mjs from Encore metadata.
name: ${COMPOSE_PROJECT_NAME:-__APP_ID__}

services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    labels:
      caddy: ${DOMAIN:-__DOMAIN__}
      caddy.reverse_proxy: "{{upstreams 8080}}"
    environment:
      DOMAIN: ${DOMAIN:-__DOMAIN__}
      NECK_DASH_USER: ${NECK_DASH_USER:-__NECK_DASH_USER__}
      NECK_DASH_PASSWORD_HASH: ${NECK_DASH_PASSWORD_HASH:-__NECK_DASH_PASSWORD_HASH_DEFAULT_COMPOSE__}
    expose:
      - "8080"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - default
      - neck-ingress
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started

  frontend:
    image: ${FRONTEND_IMAGE:-__REGISTRY__/frontend:prod}
    platform: ${PROD_PLATFORM:-__PROD_PLATFORM__}
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-/api}
      NUXT_API_INTERNAL_BASE_URL: ${NUXT_API_INTERNAL_BASE_URL:-http://backend:8080}
      NUXT_PUBLIC_ENCORE_TOOLBAR: ${NUXT_PUBLIC_ENCORE_TOOLBAR:-true}
      NUXT_PUBLIC_ENCORE_TOOLBAR_ENV_NAME: ${NUXT_PUBLIC_ENCORE_TOOLBAR_ENV_NAME:-production}
      PORT: 3000
      HOST: 0.0.0.0
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_started

  backend:
    image: ${BACKEND_IMAGE:-__REGISTRY__/backend:prod}
    platform: ${PROD_PLATFORM:-__PROD_PLATFORM__}
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - unset ENCORE_INFRA_CONFIG_PATH; exec node --enable-source-maps /workspace/backend/.encore/build/combined/combined/main.mjs
    environment:
      PORT: 8080
      ENCORE_RUNTIME_CONFIG_PATH: /encore/runtime.prod.pb
      VICTORIA_METRICS_REMOTE_WRITE_URL: ${VICTORIA_METRICS_REMOTE_WRITE_URL:-http://victoria-metrics:8428/api/v1/write?extra_label=app_id=__APP_ID__}
    expose:
      - "8080"
    volumes:
      - ./encore/runtime.prod.pb:/encore/runtime.prod.pb:ro
    networks:
      - default
      - neck-ingress
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 8

networks:
  neck-ingress:
    external: true
    name: ${NECK_INGRESS_NETWORK:-neck-ingress}
