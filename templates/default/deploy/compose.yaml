# Generated by scripts/generate-encore-config.mjs from Encore metadata.
name: ${COMPOSE_PROJECT_NAME:-__APP_ID__}

services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-__DOMAIN__}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-__CADDY_ACME_EMAIL__}
      ENCORE_DASHBOARD_DOMAIN: ${ENCORE_DASHBOARD_DOMAIN:-__ENCORE_DASHBOARD_DOMAIN__}
      ENCORE_DASHBOARD_USER: ${ENCORE_DASHBOARD_USER:-__ENCORE_DASHBOARD_USER__}
      ENCORE_DASHBOARD_PASSWORD_HASH: ${ENCORE_DASHBOARD_PASSWORD_HASH:-__ENCORE_DASHBOARD_PASSWORD_HASH_COMPOSE_DEFAULT__}
      ENCORE_DASHBOARD_URL: ${ENCORE_DASHBOARD_URL:-__ENCORE_DASHBOARD_URL__}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started

  frontend:
    image: ${FRONTEND_IMAGE:-__REGISTRY__/frontend:prod}
    platform: ${PROD_PLATFORM:-__PROD_PLATFORM__}
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-/api}
      NUXT_API_INTERNAL_BASE_URL: ${NUXT_API_INTERNAL_BASE_URL:-http://backend:8080}
      NUXT_PUBLIC_ENCORE_TOOLBAR: ${NUXT_PUBLIC_ENCORE_TOOLBAR:-true}
      NUXT_PUBLIC_ENCORE_TOOLBAR_ENV_NAME: ${NUXT_PUBLIC_ENCORE_TOOLBAR_ENV_NAME:-production}
      PORT: 3000
      HOST: 0.0.0.0
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_started

  backend:
    image: ${BACKEND_IMAGE:-__REGISTRY__/backend:prod}
    platform: ${PROD_PLATFORM:-__PROD_PLATFORM__}
    restart: unless-stopped
    environment:
      PORT: 8080
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 8

volumes:
  caddy_data:
  caddy_config:
