# Shared per-server NECK Dash and SigNoz stack. Deploy this once per Komodo server.
name: neckdash

services:
  neckdash:
    image: ${NECKDASH_IMAGE:-ghcr.io/thetechquant/neck-stack/neckdash:latest}
    platform: ${PROD_PLATFORM:-__PROD_PLATFORM__}
    restart: unless-stopped
    environment:
      PORT: 8080
      NECKDASH_TRACE_AUTH_KEYS: ${NECKDASH_TRACE_AUTH_KEYS:-__APP_ID__=__TRACE_AUTH_KEY_DEFAULT__}
      NECKDASH_REQUIRE_TRACE_AUTH: ${NECKDASH_REQUIRE_TRACE_AUTH:-true}
      SIGNOZ_OTLP_TRACES_URL: ${SIGNOZ_OTLP_TRACES_URL:-http://signoz-otel-collector:4318/v1/traces}
      SIGNOZ_OTLP_LOGS_URL: ${SIGNOZ_OTLP_LOGS_URL:-http://signoz-otel-collector:4318/v1/logs}
      SIGNOZ_OTLP_METRICS_URL: ${SIGNOZ_OTLP_METRICS_URL:-http://signoz-otel-collector:4318/v1/metrics}
      SIGNOZ_BASE_URL: ${SIGNOZ_BASE_URL:-/__signoz}
    expose:
      - "8080"
    networks:
      - neck-ingress
    depends_on:
      signoz-otel-collector:
        condition: service_started

  signoz:
    image: ${SIGNOZ_IMAGE:-signoz/signoz:v0.122.0}
    platform: ${PROD_PLATFORM:-__PROD_PLATFORM__}
    restart: unless-stopped
    environment:
      SIGNOZ_ALERTMANAGER_PROVIDER: signoz
      SIGNOZ_GLOBAL_EXTERNAL__URL: ${SIGNOZ_EXTERNAL_URL:-https://__DOMAIN__/__signoz}
      SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_SQLSTORE_SQLITE_PATH: /var/lib/signoz/signoz.db
      SIGNOZ_TOKENIZER_JWT_SECRET: ${SIGNOZ_TOKENIZER_JWT_SECRET:-__SIGNOZ_JWT_SECRET_DEFAULT__}
      SIGNOZ_USER_ROOT_ENABLED: ${SIGNOZ_USER_ROOT_ENABLED:-true}
      SIGNOZ_USER_ROOT_EMAIL: ${SIGNOZ_USER_ROOT_EMAIL:-__SIGNOZ_ROOT_EMAIL_DEFAULT__}
      SIGNOZ_USER_ROOT_PASSWORD: ${SIGNOZ_USER_ROOT_PASSWORD:-__SIGNOZ_ROOT_PASSWORD_DEFAULT__}
      SIGNOZ_USER_ROOT_ORG_NAME: ${SIGNOZ_USER_ROOT_ORG_NAME:-NECK}
    volumes:
      - signoz_sqlite:/var/lib/signoz
    expose:
      - "8080"
    networks:
      - neck-ingress
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  signoz-otel-collector:
    image: ${SIGNOZ_COLLECTOR_IMAGE:-signoz/signoz-otel-collector:v0.144.3}
    platform: ${PROD_PLATFORM:-__PROD_PLATFORM__}
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - /signoz-otel-collector migrate sync check && /signoz-otel-collector --config=/etc/otel-collector-config.yaml
    environment:
      OTEL_RESOURCE_ATTRIBUTES: host.name=neckdash,os.type=linux
      LOW_CARDINAL_EXCEPTION_GROUPING: "false"
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER: cluster
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION: "true"
      SIGNOZ_OTEL_COLLECTOR_TIMEOUT: 10m
    volumes:
      - ./signoz-otel-collector.yaml:/etc/otel-collector-config.yaml:ro
    expose:
      - "4317"
      - "4318"
    networks:
      - neck-ingress
    depends_on:
      signoz-telemetrystore-migrator:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy

  signoz-telemetrystore-migrator:
    image: ${SIGNOZ_COLLECTOR_IMAGE:-signoz/signoz-otel-collector:v0.144.3}
    platform: ${PROD_PLATFORM:-__PROD_PLATFORM__}
    restart: on-failure
    entrypoint: ["/bin/sh", "-c"]
    command:
      - /signoz-otel-collector migrate bootstrap && /signoz-otel-collector migrate sync up && /signoz-otel-collector migrate async up
    environment:
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER: cluster
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION: "true"
      SIGNOZ_OTEL_COLLECTOR_TIMEOUT: 10m
    networks:
      - neck-ingress
    depends_on:
      clickhouse:
        condition: service_healthy

  signoz-init-clickhouse:
    image: ${SIGNOZ_CLICKHOUSE_IMAGE:-clickhouse/clickhouse-server:25.5.6}
    platform: ${PROD_PLATFORM:-__PROD_PLATFORM__}
    restart: on-failure
    command:
      - bash
      - -c
      - |
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    volumes:
      - signoz_clickhouse_scripts:/var/lib/clickhouse/user_scripts
    networks:
      - neck-ingress

  zookeeper-1:
    image: ${SIGNOZ_ZOOKEEPER_IMAGE:-signoz/zookeeper:3.7.1}
    platform: ${PROD_PLATFORM:-__PROD_PLATFORM__}
    user: root
    restart: unless-stopped
    environment:
      ZOO_SERVER_ID: 1
      ALLOW_ANONYMOUS_LOGIN: "yes"
      ZOO_AUTOPURGE_INTERVAL: 1
      ZOO_ENABLE_PROMETHEUS_METRICS: "yes"
      ZOO_PROMETHEUS_METRICS_PORT_NUMBER: 9141
    volumes:
      - signoz_zookeeper:/bitnami/zookeeper
    expose:
      - "2181"
    networks:
      - neck-ingress
    healthcheck:
      test: ["CMD-SHELL", "curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null"]
      interval: 30s
      timeout: 5s
      retries: 5

  clickhouse:
    image: ${SIGNOZ_CLICKHOUSE_IMAGE:-clickhouse/clickhouse-server:25.5.6}
    platform: ${PROD_PLATFORM:-__PROD_PLATFORM__}
    restart: unless-stopped
    tty: true
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: 1
    volumes:
      - ./clickhouse-cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse-custom-function.xml:/etc/clickhouse-server/custom-function.xml:ro
      - signoz_clickhouse_scripts:/var/lib/clickhouse/user_scripts
      - signoz_clickhouse:/var/lib/clickhouse
    expose:
      - "8123"
      - "9000"
    networks:
      - neck-ingress
    depends_on:
      signoz-init-clickhouse:
        condition: service_completed_successfully
      zookeeper-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8123/ping"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  signoz_clickhouse:
  signoz_clickhouse_scripts:
  signoz_sqlite:
  signoz_zookeeper:

networks:
  neck-ingress:
    external: true
    name: ${NECK_INGRESS_NETWORK:-neck-ingress}
