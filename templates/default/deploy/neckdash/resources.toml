# Shared NECK Dash Komodo stack. Import once per server, not once per app.
[[stack]]
name = "neckdash"
description = "Shared per-server NECK Dash and SigNoz observability stack"
tags = ["neck", "observability"]
deploy = true

[stack.config]
server = "__KOMODO_SERVER__"
project_name = "neckdash"
run_directory = "__RUN_DIRECTORY__"
file_paths = ["deploy/neckdash/compose.yaml"]
git_provider = "__GIT_PROVIDER__"
git_account = "__GIT_ACCOUNT__"
repo = "__GITLAB_PROJECT__"
branch = "main"
environment = """
NECK_INGRESS_NETWORK = neck-ingress
NECKDASH_APPS_ROOT = /opt/stacks
NECKDASH_TRACE_AUTH_KEYS = __APP_ID__=__TRACE_AUTH_KEY_DEFAULT__
NECKDASH_REQUIRE_TRACE_AUTH = true
NUXT_APP_BASE_URL = /__neck_dash/
NUXT_PUBLIC_NECKDASH_API_BASE_URL = /__neck_dash/api
NUXT_PUBLIC_SIGNOZ_BASE_URL = /__signoz
NUXT_NECKDASH_API_INTERNAL_BASE_URL = http://neckdash:8080
SIGNOZ_BASE_URL = /__signoz
SIGNOZ_EXTERNAL_URL = https://__DOMAIN__/__signoz
SIGNOZ_OTLP_TRACES_URL = http://signoz-otel-collector:4318/v1/traces
SIGNOZ_OTLP_LOGS_URL = http://signoz-otel-collector:4318/v1/logs
SIGNOZ_OTLP_METRICS_URL = http://signoz-otel-collector:4318/v1/metrics
SIGNOZ_TOKENIZER_JWT_SECRET = __SIGNOZ_JWT_SECRET_DEFAULT__
NECKDASH_KOMODO_URL = [[NECKDASH_KOMODO_URL]]
NECKDASH_KOMODO_API_KEY = [[NECKDASH_KOMODO_API_KEY]]
NECKDASH_KOMODO_API_SECRET = [[NECKDASH_KOMODO_API_SECRET]]
PROD_PLATFORM = __PROD_PLATFORM__

NECKDASH_IMAGE = ghcr.io/thetechquant/neck-stack/neckdash:latest
NECKDASH_UI_IMAGE = ghcr.io/thetechquant/neck-stack/neckdash-ui:latest
SIGNOZ_IMAGE = signoz/signoz:v0.122.0
SIGNOZ_COLLECTOR_IMAGE = signoz/signoz-otel-collector:v0.144.3
SIGNOZ_CLICKHOUSE_IMAGE = clickhouse/clickhouse-server:25.5.6
SIGNOZ_ZOOKEEPER_IMAGE = signoz/zookeeper:3.7.1
"""

[[procedure]]
name = "neck-auto-update"
description = "Polls NECK stacks for new production images and redeploys stacks with auto_update enabled"
tags = ["neck", "system"]

[procedure.config]
schedule_format = "English"
schedule = "Every 5 minutes"
schedule_enabled = true
schedule_timezone = "UTC"
schedule_alert = false
failure_alert = true

[[procedure.config.stage]]
name = "Poll stack images"
enabled = true
executions = [
  { execution.type = "GlobalAutoUpdate", execution.params = {}, enabled = true },
]
